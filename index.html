<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>탐구활동 가이드 및 세특 모범사례</title>
<style>
:root{
  --panel:#ffffff;
  --ink:#13223a;
  --muted:#65758d;
  --line:#dbe3ef;
  --navy:#122b49;
  --blue:#2563eb;
  --soft:#f7faff;
  --shadow:0 18px 45px rgba(18,43,73,.10);
  --radius:20px;
  --page-max:1440px;
  --page-gap:68px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:linear-gradient(180deg,#f8fbff 0%,#eef4fb 100%);
  font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--ink);
  line-height:1.72;
}
header{
  width:min(calc(100% - var(--page-gap) * 2),var(--page-max));
  margin:18px auto 0;
  background:
    radial-gradient(circle at 92% 10%,rgba(255,255,255,.16),transparent 28%),
    linear-gradient(90deg,#1f2b49 0%,#28365f 48%,#7983c6 100%);
  color:#fff;
  min-height:118px;
  padding:0 36px;
  border-radius:26px;
  border:1px solid rgba(148,163,210,.70);
  box-shadow:0 10px 26px rgba(18,43,73,.12), inset 0 1px 0 rgba(255,255,255,.18);
  display:flex;
  align-items:center;
}
.header-inner{max-width:none;margin:0;padding:0}
h1{font-size:clamp(31px,3vw,42px);line-height:1.08;margin:0;font-weight:900;letter-spacing:-.055em;text-shadow:0 2px 8px rgba(0,0,0,.14)}
.lead{margin:0;max-width:100%;color:#edf4ff;font-size:clamp(16px,2.05vw,21px);line-height:1.55;font-weight:800;letter-spacing:-.035em}
main{width:min(calc(100% - var(--page-gap) * 2),var(--page-max));max-width:none;margin:14px auto 48px;padding:0;position:relative;z-index:2}
.tab-wrap{
  background:rgba(255,255,255,.96);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:12px;
  position:sticky;
  top:10px;
  z-index:20;
  backdrop-filter:blur(10px);
}
.tabs{display:flex;flex-wrap:wrap;gap:8px;overflow:visible;padding:2px 2px 4px;scrollbar-width:none}
.tab{
  border:1px solid var(--line);
  background:#fff;
  color:#26364d;
  border-radius:999px;
  padding:10px 15px;
  font-weight:800;
  white-space:nowrap;
  cursor:pointer;
  transition:.18s;
  font-size:14px;
}
.tabs::-webkit-scrollbar{display:none}
.tab:hover{transform:translateY(-1px);border-color:#a9c7eb}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.tab-short{display:none}
.content{margin-top:14px}
.section-head{margin:16px 0 12px}
.section-title{display:flex;gap:10px;align-items:center}
.section-badge,.guide-badge{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:var(--navy);color:#fff;font-weight:900;flex:0 0 34px}
.section-head h2,.guide-title h2{font-size:24px;margin:0;font-weight:900;letter-spacing:-.035em}
.guide-hero{
  background:transparent;
  border:0;
  border-radius:0;
  box-shadow:none;
  padding:0;
}
.guide-title{display:flex;gap:10px;align-items:center;margin:0 0 14px}

.mobile-guide-report-btn{display:none;align-items:center;justify-content:center;text-decoration:none;background:var(--navy);color:#fff;border:1px solid var(--navy);border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;line-height:1.12;letter-spacing:-.045em;box-shadow:0 6px 14px rgba(18,43,73,.14);white-space:nowrap;flex:0 0 auto}
.mobile-guide-report-btn:hover{transform:translateY(-1px)}

.guide-block{border:1px solid var(--line);border-radius:22px;padding:14px;background:linear-gradient(180deg,#fff 0%,#f9fbff 100%)}
.guide-block + .guide-block{margin-top:12px}
.block-heading{display:flex;align-items:center;gap:10px;margin:0 0 10px;flex-wrap:wrap;padding:8px 12px;border:1px solid #9fb9de;border-radius:15px;background:linear-gradient(180deg,#d6e6fb 0%,#c3d9f6 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.55)}
.table-align-heading{padding-left:14px}
.block-heading .pill{display:inline-flex;align-items:center;justify-content:center;padding:6px 11px;border-radius:999px;border:1px solid #8eaed8;background:#ffffff;color:#102a43;font-weight:900;font-size:13px;box-shadow:0 2px 6px rgba(18,43,73,.08)}
.block-heading h3{margin:0;font-size:21px;font-weight:900;letter-spacing:-.03em;color:#102a43}
.title-count-circle{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;background:#102a43;color:#fff;font-size:16px;font-weight:900;letter-spacing:-.03em;line-height:1;margin:0 5px;vertical-align:middle;box-shadow:0 8px 18px rgba(18,43,73,.18)}
.flow-row{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;align-items:stretch}
.flow-card{position:relative;border:1px solid var(--line);background:#fff;border-radius:15px;padding:10px 9px 9px;min-height:0;height:100%;text-align:center;box-shadow:0 7px 18px rgba(18,43,73,.052);display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
.flow-card::after{content:"›";position:absolute;right:-20px;top:50%;transform:translateY(-50%);width:20px;text-align:center;font-size:32px;font-weight:900;color:#102a43;z-index:3;line-height:1}
.flow-card:last-child::after{display:none}
.flow-no{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;box-shadow:0 5px 12px rgba(18,43,73,.13);margin-bottom:6px}
.flow-card h4{margin:0 0 4px;font-size:14px;line-height:1.25;font-weight:900;color:#102a43}
.flow-card p{margin:0;font-size:12.6px;line-height:1.38;color:#34445b}

.report-link-wrap{display:flex;justify-content:center;margin-top:12px}
.report-link-btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;background:var(--navy);color:#fff;border:1px solid var(--navy);border-radius:999px;padding:10px 20px;font-size:14px;font-weight:900;line-height:1.15;letter-spacing:-.03em;box-shadow:0 8px 18px rgba(18,43,73,.16);transition:.18s;white-space:nowrap}
.report-link-btn:hover{transform:translateY(-1px);box-shadow:0 11px 22px rgba(18,43,73,.20)}
.flow-heading{flex-wrap:nowrap}
.flow-heading h3{flex:1 1 auto;min-width:0}
.heading-report-btn{margin-left:auto;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;background:var(--navy);color:#fff;border:1px solid var(--navy);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:900;line-height:1.15;letter-spacing:-.03em;box-shadow:0 6px 14px rgba(18,43,73,.14);transition:.18s;white-space:nowrap;flex:0 0 auto}
.heading-report-btn:hover{transform:translateY(-1px);box-shadow:0 9px 18px rgba(18,43,73,.18)}
.manual-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:stretch}
.manual-card{position:relative;text-align:center;padding:10px 8px 0}
.manual-card::after{content:"›";position:absolute;right:-14px;top:38px;font-size:44px;font-weight:900;color:#102a43;line-height:1}
.manual-card:last-child::after{display:none}
.manual-circle{width:112px;height:112px;border-radius:50%;margin:0 auto 14px;background:#fff;border:10px solid #e2f0f6;display:flex;align-items:center;justify-content:center;color:#0d2a4d;font-size:21px;line-height:1.12;font-weight:900;box-shadow:0 10px 24px rgba(18,43,73,.06)}
.manual-desc{font-size:14px;line-height:1.6;text-align:center;color:#27384f}
.manual-desc strong{display:block;font-size:16px;margin-bottom:4px;color:#102a43}
.frame-table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border:1px solid var(--line);border-radius:16px;background:#fff;font-size:14px}
.frame-table th,.frame-table td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top}
.frame-table tr:last-child td{border-bottom:0}
.frame-table th{background:#f0f5fc;color:#102a43;text-align:left;font-weight:900}
.frame-table td:first-child{font-weight:900;color:#102a43;width:130px}

.type-guide-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.type-card{border:1px solid #dbe6f5;background:#fff;border-radius:18px;padding:18px 18px 16px;box-shadow:0 10px 24px rgba(18,43,73,.06);border-left:6px solid var(--navy)}
.type-label{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:5px 13px;margin-bottom:10px;background:var(--navy);color:#fff;font-weight:900;font-size:14px}
.type-card h4{margin:0 0 8px;font-size:19px;font-weight:900;letter-spacing:-.03em;color:#102a43}
.type-card p{margin:0 0 10px;font-size:14px;line-height:1.65;color:#33445b}
.type-note{display:inline-flex;align-items:center;border:1px solid #cddbed;background:#f4f8fd;border-radius:999px;padding:4px 10px;font-size:13px;font-weight:900;color:#26364d}
.type-summary{margin-top:14px;border:1px solid #d7e5f7;background:#f0f6ff;border-radius:16px;padding:14px 16px;font-weight:900;color:#24364f;line-height:1.7}
.type-summary span{display:inline-block;margin-right:12px}

.type-check-table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border:1px solid var(--line);border-radius:16px;background:#fff;font-size:14px}
.type-check-table th,.type-check-table td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top}
.type-check-table tr:last-child td{border-bottom:0}
.type-check-table th{background:#f0f5fc;color:#102a43;text-align:left;font-weight:900}
.type-check-table .type-no{width:90px;text-align:center;font-weight:900;color:#102a43;background:#f8fbff}
.type-check-table .type-title{width:210px;font-weight:900;color:#102a43}
.type-check-table .type-note-cell{width:190px;color:#26364d;font-weight:800}

.selfeval-table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border:1px solid var(--line);border-radius:16px;background:#fff;font-size:14px}
.selfeval-table th,.selfeval-table td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.selfeval-table tr:last-child td{border-bottom:0}
.selfeval-table th{background:#f0f5fc;color:#102a43;text-align:left;font-weight:900}
.selfeval-table .num{width:58px;text-align:center;font-weight:900;color:#102a43}
.selfeval-table .fill{width:180px;font-weight:900;color:#1555a8}
.selfeval-table .template{color:#28384f;line-height:1.7}
.selfeval-table .blank{display:inline-block;min-width:110px;height:1.05em;border-bottom:2px solid #b9c8dc;margin:0 5px;vertical-align:-0.12em;transform:none}
.selfeval-note{margin-top:14px;border:1px solid #d7e5f7;background:#f0f6ff;border-radius:16px;padding:14px 16px;color:#26364d;line-height:1.7;font-size:14px}
.selfeval-note strong{color:#102a43}
.selfeval-flow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.selfeval-flow span{display:inline-flex;align-items:center;justify-content:center;border:1px solid #cddbed;background:#fff;border-radius:999px;padding:6px 11px;font-weight:900;color:#26364d;font-size:13px}
.keyword-grid{display:grid;grid-template-columns:repeat(5,minmax(170px,1fr));gap:7px}
.keyword-chip{display:flex;gap:6px;align-items:center;border:1px solid var(--line);background:#fff;border-radius:12px;padding:7px 8px;font-size:13.5px;line-height:1.3;min-height:40px;min-width:0}
.keyword-chip b{display:inline-flex;align-items:center;justify-content:center;flex:0 0 26px;height:26px;border-radius:50%;background:#eff5ff;color:#1555a8;font-size:11.5px;font-weight:900}
.keyword-chip span{min-width:0;word-break:keep-all;overflow-wrap:break-word;white-space:normal;overflow:visible}
.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:0 12px 30px rgba(18,43,73,.07);overflow:hidden}
.card-head{padding:18px 18px 12px;border-bottom:1px solid #eef2f7;background:linear-gradient(180deg,#ffffff 0%,#fbfdff 100%)}
.card-title{margin:0;font-size:18px;font-weight:900;letter-spacing:-.02em;color:#102a43}
.card-source{margin-top:7px;color:#65758d;font-size:13px;font-weight:800;line-height:1.35}
.section-meta{margin:6px 0 0 44px;color:#65758d;font-size:14px;font-weight:800}
.card-body{padding:16px 18px 18px;font-size:15px;color:#253349;white-space:pre-line}
.tag{display:inline-block;border-radius:6px;padding:1px 5px;margin:0 1px 0 0;background:#eaf3ff;color:#1555a8;font-size:.92em;font-weight:900}
footer{
  width:min(calc(100% - var(--page-gap) * 2),var(--page-max));
  max-width:none;
  margin:10px auto 34px;
  padding:0;
  text-align:center;
  color:#65758d;
  font-size:13px;
  font-weight:800;
}
@media (max-width:1160px){
  .keyword-grid{grid-template-columns:repeat(4,minmax(170px,1fr))}
}
@media (max-width:980px){
  :root{--page-gap:18px}
  .flow-row{grid-template-columns:1fr;gap:8px}
  .manual-row{grid-template-columns:1fr}
  .flow-card{min-height:auto;height:auto;text-align:left;align-items:flex-start;padding:10px 12px;display:grid;grid-template-columns:30px 1fr;gap:2px 9px}
  .flow-card::after,.manual-card::after{display:none}
    .flow-no{grid-row:1 / span 2;margin:0;width:24px;height:24px;font-size:12px}
  .manual-card{display:grid;grid-template-columns:94px 1fr;gap:12px;align-items:center;text-align:left;padding:8px 0 12px;border-bottom:1px dashed #d7e1ee}
  .manual-card:last-child{border-bottom:0}
  .manual-circle{width:88px;height:88px;margin:0;font-size:18px;border-width:8px}
  .manual-desc{text-align:left}
  .keyword-grid{grid-template-columns:repeat(3,minmax(150px,1fr));gap:6px}
  .keyword-chip{padding:6px 7px;font-size:13px;gap:5px}
  .keyword-chip b{flex-basis:24px;height:24px;font-size:11px}
  .type-guide-grid{grid-template-columns:1fr}
  .selfeval-table{font-size:13px}
  .selfeval-table th,.selfeval-table td{padding:10px 9px}
    .selfeval-table .fill{width:100px}
  .selfeval-table .blank{min-width:72px}
  .type-check-table{font-size:13px}
  .type-check-table th,.type-check-table td{padding:10px 9px}
  .type-check-table .type-no{width:58px}
  .type-check-table .type-title{width:120px}
  .type-check-table .type-note-cell{width:120px}
  .cards{grid-template-columns:1fr}
}

@media (max-width:820px){
  .tab-wrap{padding:9px;overflow:hidden}
  .tabs{
    display:grid;
    grid-template-columns:minmax(0,1.05fr) repeat(5,minmax(0,.66fr)) minmax(0,.9fr) minmax(0,1.02fr);
    gap:5px;
    width:100%;
    overflow:hidden;
    padding:0;
    align-items:center;
  }
  .tab{
    width:100%;
    min-width:0;
    padding:8px 5px;
    font-size:clamp(11px,2vw,15px);
    line-height:1.08;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    letter-spacing:-.055em;
  }
  .tab-full{display:none}
  .tab-short{display:inline}
}

@media (max-width:560px){
  :root{--page-gap:12px}
  header{
    width:calc(100% - var(--page-gap) * 2);
    margin:10px auto 0;
    min-height:82px;
    padding:0 18px;
    border-radius:22px;
  }
  h1{
    font-size:clamp(18px,5.15vw,29px);
    line-height:1.05;
    margin:0;
    white-space:nowrap;
    letter-spacing:-.075em;
  }
  .lead{font-size:15px;line-height:1.55;font-weight:800}
  main{width:calc(100% - var(--page-gap) * 2);padding:0;margin-top:10px}
  .tab-wrap{position:relative;top:auto;padding:8px;overflow:hidden}
  .tabs{
    display:grid;
    grid-template-columns:minmax(0,1.02fr) repeat(5,minmax(0,.58fr)) minmax(0,.82fr) minmax(0,.96fr);
    gap:4px;
    padding:0;
    width:100%;
    overflow:hidden;
    align-items:center;
  }
  .tab{
    width:100%;
    min-width:0;
    padding:7px 2px;
    font-size:clamp(9.6px,2.55vw,12px);
    line-height:1.08;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    letter-spacing:-.07em;
  }
  .tab-full{display:none}
  .tab-short{display:inline}
  .guide-hero{padding:0}
  .guide-title{gap:8px;margin:0 0 10px}
  .guide-title h2{font-size:20px;line-height:1.15;white-space:nowrap}
  .mobile-guide-report-btn{display:inline-flex;margin-left:auto;font-size:10.5px;padding:6px 8px}
  .flow-heading .heading-report-btn{display:none}
  .flow-heading h3{overflow:visible;text-overflow:clip}
  .guide-block{padding:10px}

  .report-link-wrap{margin-top:9px}
  .report-link-btn{width:100%;padding:10px 12px;font-size:13px}
  .block-heading{padding:7px 9px;margin-bottom:8px}
  .block-heading h3{font-size:18px}
  .heading-report-btn{padding:7px 10px;font-size:12px}
  .title-count-circle{width:44px;height:44px;font-size:14px;margin:0 4px}
  .table-align-heading{padding-left:12px}
  .keyword-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    align-items:stretch;
    gap:4px;
    margin-left:0;
    margin-right:0;
  }
  .keyword-chip{
    width:100%;
    max-width:none;
    min-width:0;
    justify-content:flex-start;
    gap:2px;
    padding:3px 4px;
    min-height:26px;
    border-radius:999px;
    font-size:10px;
    line-height:1.12;
  }
  .keyword-chip b{flex:0 0 17px;height:17px;font-size:9px}
  .keyword-chip span{min-width:0;white-space:normal;word-break:keep-all;overflow-wrap:break-word;letter-spacing:-.07em;overflow:visible}
  .selfeval-table{font-size:12.5px;table-layout:auto}
  .selfeval-table th,.selfeval-table td{padding:8px 6px}
  .selfeval-table th:first-child,.selfeval-table .num{width:32px;min-width:32px;padding-left:3px;padding-right:3px}
  .selfeval-table .fill{width:82px;padding-left:5px;padding-right:5px}
  .selfeval-table .template{padding-left:7px;padding-right:7px;line-height:1.55;word-break:keep-all;overflow-wrap:break-word}
  .selfeval-table .blank{min-width:50px;margin:0 3px}
  .card-head{padding:15px 15px 10px}
  .card-body{padding:14px 15px 16px;font-size:14px}


  /* 모바일: 유형 진단은 표보다 카드형이 더 읽기 쉬움. 유형 번호+제목을 한 줄 상단에 두고, 설명과 점검 포인트를 아래로 분리 */
  .type-check-table{
    display:block;
    width:100%;
    border:0;
    border-radius:0;
    overflow:visible;
    background:transparent;
    font-size:14px;
  }
  .type-check-table thead{display:none}
  .type-check-table tbody{display:grid;gap:10px}
  .type-check-table tr{
    display:grid;
    grid-template-columns:auto 1fr;
    gap:6px 9px;
    padding:12px;
    border:1px solid var(--line);
    border-radius:16px;
    background:#fff;
    overflow:hidden;
    box-shadow:0 8px 18px rgba(18,43,73,.06);
  }
  .type-check-table th,
  .type-check-table td{
    display:block;
    width:auto !important;
    padding:0;
    border:0;
    line-height:1.55;
    white-space:normal;
    word-break:keep-all;
    overflow-wrap:break-word;
    vertical-align:top;
  }
  .type-check-table td::before{
    display:inline-block;
    margin:0 6px 0 0;
    color:#65758d;
    font-size:11.5px;
    line-height:1.35;
    font-weight:900;
  }
  .type-check-table .type-no{
    grid-column:1;
    align-self:start;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:5px 9px;
    border-radius:999px;
    background:#102a43;
    color:#fff;
    text-align:center;
    font-size:12px;
    line-height:1.15;
    font-weight:900;
    white-space:nowrap;
  }
  .type-check-table .type-no::before{display:none}
  .type-check-table .type-title{
    grid-column:2;
    align-self:center;
    background:transparent;
    color:#102a43;
    font-size:15px;
    line-height:1.35;
    font-weight:900;
  }
  .type-check-table .type-title::before{display:none}
  .type-check-table td:nth-child(3){
    grid-column:1 / -1;
    padding-top:7px;
    border-top:1px solid #eef2f7;

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function highlightTags(text) {
  return escapeHtml(text).replace(/\[(총평|수업|호기심|탐구|심화탐구|평가)\]/g, '<span class="tag">[$1]</span>');
}

const SHORT_LABELS = {
  '탐구활동 가이드':'가이드',
  '국어':'국',
  '영어':'영',
  '수학':'수',
  '사회':'사',
  '과학':'과',
  '정보':'정보',
  '동아리':'동아리'
};

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = ORDER.map(name => `
    <button class="tab ${name === current ? 'active' : ''}" type="button" data-tab="${escapeHtml(name)}">
      <span class="tab-full">${escapeHtml(name)}</span><span class="tab-short">${escapeHtml(SHORT_LABELS[name] || name)}</span>
    </button>
  `).join('');
  tabs.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      current = btn.dataset.tab;
      renderTabs();
      renderContent();
      window.scrollTo({top:0, behavior:'smooth'});
    });
  });
}

function keywordGrid(words) {
  return `<div class="keyword-grid">${words.map((word, i) => `<div class="keyword-chip"><b>${i+1}</b><span>${escapeHtml(word)}</span></div>`).join('')}</div>`;
}

      </thead>
      <tbody>
        ${TYPE_GUIDE.map(item => `
          <tr>

            <td class="type-title">${escapeHtml(item.title)}</td>

        `).join('')}
      </tbody>
    </table>
    <div class="type-summary">

}

  return `

      <thead>
        <tr><th>번호</th><th>채울 내용</th><th>자연스럽게 이어 쓰는 문장 틀</th></tr>

      <div class="selfeval-flow">
        <span>배운 내용</span><span>관심과 질문</span><span>자료 활용</span><span>알게 된 점</span><span>성장과 진로 연결</span>
      </div>
    </div>`;
}

function renderExamples() {
  const rows = DATA.filter(item => item.category === current);
  const cards = rows.map(item => `
    <article class="card">
      <div class="card-head">
        <h3 class="card-title">${escapeHtml(item.title)}</h3>
        ${item.source ? `<div class="card-source">${escapeHtml(item.source)}</div>` : ''}
      </div>
      <div class="card-body">${highlightTags(item.text)}</div>
    </article>
  `).join('');
  return `<div class="section-head"><div class="section-title"><span class="section-badge">✓</span><h2>${escapeHtml(current)} 세특 사례</h2></div><p class="section-meta">${rows.length}개 사례</p></div><div class="cards">${cards}</div>`;
